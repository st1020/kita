base_url = "https://kita-zola.pages.dev"
title = "Kita"
description = "Kita is a clean, elegant and simple blog theme for Zola."
author = "st1020"
default_language = "en"
taxonomies = [{ name = "tags", rss = true, paginate_by = 5 }]


[markdown]
github_alerts = true
insert_anchor_links = "heading"

[markdown.highlighting]
# Kita theme supports both "inline" and "class" modes.
style = "class"

# You can use a single theme.
# theme = "dark-plus"

# If light/dark themes are set, the code highlighting theme will follow Kita theme's light/dark mode.
light_theme = "light-plus"
dark_theme = "dark-plus"


# The Kita theme config.
[extra]
# Enable KaTex math formula support globally.
math = false
# Enable mermaid support globally.
mermaid = false
# Enable comment support globally.
comment = false
# Enable floating table of contents on the right side of the post page.
side_toc = true
# The URL of social image.
social_image = "icons/github.svg"

# The Kita style config.
[extra.style]
# The custom background color.
# bg_color = ""

# The custom background color in dark mode.
# bg_dark_color = ""

# Enable header blur.
# header_blur = true

# The custom header color, only available when `header_blur` is false.
# header_color = ""

# The custom header color in dark mode, only available when `header_blur` is false.
# header_dark_color = ""

# The profile on home page.
[extra.profile]
name = "Kita - Zola Theme"
bio = "Kita is a clean, elegant and simple blog theme for Zola."
# The URL of avatar.
avatar_url = "icons/github.svg"
# Invert color in dark mode.
avatar_invert = true

# The social icons below the profile on the home page.
# The `name` should be the file name of static/icons/*.svg or the icon name of https://simpleicons.org/
[[extra.profile.social]]
name = "github"
url = "https://github.com/st1020/kita"

[[extra.profile.social]]
name = "twitter"
url = "https://github.com/st1020/kita"

[[extra.profile.social]]
name = "rss"
url = "$BASE_URL/atom.xml"

# The top menu.
[[extra.menu]]
name = "Projects"
url = "$BASE_URL/projects"

[[extra.menu]]
name = "Archive"
url = "$BASE_URL/archive"

[[extra.menu]]
name = "Tags"
url = "$BASE_URL/tags"

[[extra.menu]]
name = "About"
url = "$BASE_URL/about"

# The page footer options.
[extra.footer]
since = 2020
license = "CC BY-SA 4.0"
license_url = "https://creativecommons.org/licenses/by-sa/4.0/deed"

# The giscus comment options, only available when comment is enabled.
[extra.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = 1
reactions_enabled = 0
emit_metadata = 0
input_position = "top"
theme = "light"
lang = "en"
loading = "lazy"
